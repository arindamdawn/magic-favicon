name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=$(node -e 'console.log(require(\"./package.json\").version)')" >> $GITHUB_OUTPUT

      - name: Check if version already published
        run: |
          if npm view magic-favicon@${{ steps.version.outputs.version }} version &>/dev/null; then
            echo "Version ${{ steps.version.outputs.version }} already published. Skipping release."
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Validate
        run: pnpm run check

      - name: Verify npm identity
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        run: pnpm publish --access public --no-git-checks

      - name: Create GitHub Release
        run: |
          TAG_NAME="v$(node -e 'console.log(require(\"./package.json\").version)')"
          gh release create "$TAG_NAME" \
            --generate-notes \
            --title "$TAG_NAME"
